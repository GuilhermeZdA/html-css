<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 13.3</title>
    <style>

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .esquerda {
            text-align: left;   
        }

        .claro {
            background-color: white;
            color: black;
            font-weight: bold;
        }

        .escuro {
            background-color: gray;
            color: white;
            font-weight: bold;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        td, th {
            border: 1px solid black;
            padding: 5px;
            text-align: center;
        }

        th {
            background-color: gray;
            color: white;
        }

    </style>
</head>
<body>

        <thead>

                <th scope="col" rowspan="2">Área</th>
                <th scope="col" rowspan="2">Disciplinas</th>

                <th scope="col" rowspan="2">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <th class="claro" scope="rowgroup" rowspan="4">Exatas</th>
                <td class="esquerda">Matemática</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="esquerda">Física</td>

            </tr>
            <tr>

            </tr>
            <tr>

                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <th scope="row" colspan="4">Média de exatas</th>
                <td class="escuro">0.0</td>
            </tr>
            <tr>
                <th class="claro" scope="rowgroup" rowspan="2">Humanas</th>
                <td class="esquerda">História</td>
                <td>0.0</td>
                <td>0.0</td>
                <td>0.0</td>
            </tr>
            <tr>
                <td class="esquerda">Geografia</td>
                <td>0.0</td>

            </tr>
            <tr>
                <th scope="row" colspan="4">Média de Humanas</th>

</html>
