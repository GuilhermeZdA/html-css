<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações do seu ambiente.</p>
                <form action="login.php" method="post">
                    <div id="usu">
                        <label for="ilogin">Usuário: </label>
                        <input type="text" name="ilogin" id="login">
                    </div>
                    <div id="sen">
                        <label for="isenha">Senha:</label>
                        <input type="password" name="senha" id="isenha">
                    </div>
                    <div id="enviar">
                        <input type="submit" value="Confirmar">
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
