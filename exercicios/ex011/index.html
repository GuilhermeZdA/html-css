<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir essa imagem em vários dispositivos ou simplesmente aumente ou diminua o tamanho do site</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo audios</h1>
    <p>vou colocar um audio</p>
    <audio preload="metadata" controls loop>
        <source src="midia/letsgo.mp3" type="audio/mpeg">
        <p>Infelizmente seu navagador não consegue reproduzir audio <a href="midia/letsgo.mp3">Baixe o audio</a></p>
    </audio>
</body>
</html>
