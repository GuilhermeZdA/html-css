<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'Tecno';
            src: url('fonts/Ethnocentric-Regular.otf') format('opentype');
            font-style: normal;
            font-weight: normal;
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: Tecno, 'Times New Roman', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Cumque repellat, fugit qui eius reiciendis quia eos voluptatibus vero nostrum voluptatum unde iure commodi quis dignissimos, nemo iste debitis! Veritatis, error.</p>
</body>
</html>
