<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINKS</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: crimson;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: rgb(119, 12, 33);
        }

        a:hover {
            color: rgb(59, 4, 16);
            text-decoration: underline;
        }

        a:active {
            color: blue;
        }

        a::after {
            content: ' [LINK]';
            font-weight: normal;
            text-decoration: none;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara" target="_blank">Repositório Git Hub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" target="_blank">Canal do Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" target="_blank">Site Curso Em Video</a></li>
    </ul>
</body>
</html>
